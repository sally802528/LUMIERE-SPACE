<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Lumière Space</title>
    <style>
        :root {
            --accent-color: rgba(255, 255, 255, 0.9);
            --bg-glass: rgba(15, 15, 15, 0.6);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Optima', 'Segoe UI', sans-serif; }
        #canvas-container { width: 100%; height: 100%; }
        
        #fps-counter { position: absolute; top: 20px; left: 20px; color: var(--accent-color); font-family: 'Courier New', monospace; font-size: 11px; z-index: 2500; display: none; letter-spacing: 2px; padding: 6px 12px; background: var(--bg-glass); backdrop-filter: blur(10px); }
        
        #reticle { 
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; 
            transform: translate(-50%, -50%); pointer-events: none; z-index: 100; 
            border: 1px solid rgba(255,255,255,0.5); border-radius: 50%; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        #reticle.active, #reticle.bench-hit { 
            background: white; 
            box-shadow: 0 0 10px white; 
            border-color: white; 
            width: 10px; 
            height: 10px; 
        }
        
        #video-controls { position: absolute; bottom: 50px; left: 50px; display: flex; gap: 30px; z-index: 1500; opacity: 0; transition: opacity 0.5s ease; }
        .ctrl-arrow { width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; cursor: pointer; position: relative; transition: border-color 0.2s; }
        .arrow-left { border-right: 20px solid rgba(255,255,255,0.3); }
        .arrow-right { border-left: 20px solid rgba(255,255,255,0.3); }
        .ctrl-arrow.pressing { border-right-color: #fff; border-left-color: #fff; }
        
        @keyframes breath { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; border-right-color: #fff; border-left-color: #fff; } }
        .breath { animation: breath 0.6s infinite ease-in-out; }

        #video-timer { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); color: #fff; padding: 10px; font-weight: 100; letter-spacing: 4px; font-size: 12px; z-index: 1500; opacity: 0; transition: opacity 0.5s ease; text-shadow: 0 0 15px rgba(255,255,255,0.4); backdrop-filter: blur(4px); pointer-events: none; white-space: nowrap; text-align: center; }

        #interaction-prompt { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); color: white; font-size: 11px; letter-spacing: 4px; background: rgba(0,0,0,0.8); padding: 12px 25px; display: none; z-index: 1000; pointer-events: none; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); text-transform: uppercase; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; color: white; transition: opacity 0.8s ease; }
        .glass-btn { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid var(--border-glass); color: var(--accent-color); padding: 12px 35px; cursor: pointer; letter-spacing: 5px; font-size: 11px; text-transform: uppercase; transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .glass-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.6); box-shadow: 0 0 25px rgba(255, 255, 255, 0.2); transform: translateY(-2px) scale(1.02); text-shadow: 0 0 8px rgba(255,255,255,0.6); }
        .glass-btn:active { transform: translateY(1px) scale(0.98); }

        @keyframes overlay-fade-in { 0% { opacity: 0; backdrop-filter: blur(0); } 100% { opacity: 1; backdrop-filter: blur(40px); } }
        #start-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(40px); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; animation: overlay-fade-in 0.6s ease-out; }
        #start-overlay h2 { font-weight: 100; font-size: 82px; letter-spacing: 65px; margin: 0 0 60px 65px; color: rgba(255,255,255,0.9); }

        @keyframes panel-slide-up { 0% { opacity: 0; transform: translateY(30px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        #settings-panel { position: absolute; bottom: 110px; right: 40px; background: var(--bg-glass); backdrop-filter: blur(35px); color: white; padding: 35px; border: 1px solid var(--border-glass); z-index: 2500; display: none; width: 260px; max-height: 70vh; overflow-y: auto; animation: panel-slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 9px; margin-bottom: 8px; color: #aaa; letter-spacing: 2px; text-transform: uppercase; }
        .control-group input[type="range"] { width: 100%; cursor: pointer; }
        #loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: #000; display: none; align-items: center; justify-content: center; z-index: 3000; opacity: 0; transition: opacity 1s; color: white; letter-spacing: 15px; font-weight: 100; }

        @keyframes scatter-reveal { 
            0% { letter-spacing: -5px; opacity: 0; filter: blur(20px); transform: scale(0.9); } 
            100% { letter-spacing: 25px; opacity: 1; filter: blur(0); transform: scale(1); } 
        }
        #ui-layer h1 { animation: scatter-reveal 2.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .lang-btn { flex:1; padding: 5px !important; font-size: 9px !important; }
        .lang-btn.active {
            background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.6);
            text-shadow: 0 0 8px rgba(255,255,255,0.6); pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="reticle"></div>
    <div id="fps-counter">FPS: 0</div>
    <div id="interaction-prompt">PRESS [SPACE] TO SIT</div>

    <div id="video-controls">
        <div class="ctrl-arrow arrow-left" id="btn-prev"></div>
        <div class="ctrl-arrow arrow-right" id="btn-next"></div>
    </div>
    <div id="video-timer">00:00 / 00:00</div>

    <div id="ui-layer">
        <div style="text-align: center;">
            <h1 style="font-weight: 100; margin-bottom: 60px; color: rgba(255,255,255,0.9);">LUMIÈRE SPACE</h1>
            <label for="file-input" class="glass-btn" data-lang-key="enterGallery">進入展覽</label>
            <input type="file" id="file-input" webkitdirectory directory multiple style="display:none;">
        </div>
    </div>

    <div id="floor-control" class="glass-btn" data-lang-key="floors" style="position: absolute; top: 40px; right: 40px; z-index: 1500; display: none;">樓層 (E)</div>
    <div id="settings-trigger" class="glass-btn" data-lang-key="engine" style="position: absolute; bottom: 40px; right: 40px; z-index: 1500; opacity: 0.5;">設定 (U)</div>

    <div id="settings-panel">
        <div class="control-group">
            <label data-lang-key="language">語言</label>
            <div style="display: flex; gap: 10px;" id="lang-switcher">
                <button class="glass-btn lang-btn" data-lang="en">English</button>
                <button class="glass-btn lang-btn" data-lang="zh">中文</button>
            </div>
        </div>
        <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0;"></div>
        <div data-lang-key="systemOptics" style="font-size: 10px; letter-spacing: 6px; color: #fff; margin-bottom: 25px;">系統選項</div>
        <div class="control-group"><label data-lang-key="movementSpeed">移動速度</label><input type="range" id="speed-slider" min="0.1" max="1.0" step="0.05" value="0.38"></div>
        <div class="control-group"><label data-lang-key="jumpImpulse">跳躍力道</label><input type="range" id="jump-slider" min="0.1" max="0.6" step="0.05" value="0.2"></div>
        <div class="control-group"><label data-lang-key="footstepVolume">腳步聲音量</label><input type="range" id="footstep-slider" min="0" max="1" step="0.1" value="1.0"></div>
        <div class="control-group"><label data-lang-key="ambienceVolume">環境音量</label><input type="range" id="ambience-slider" min="0" max="1" step="0.1" value="0.5"></div>
        <div class="control-group"><label data-lang-key="musicVolume">音樂音量</label><input type="range" id="music-slider" min="0" max="1" step="0.1" value="0.3"></div>
        <div class="control-group"><label data-lang-key="viewPerspective">視角廣度 (FOV)</label><input type="range" id="fov-slider" min="40" max="120" step="1" value="60"></div>
        <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0;"></div>
        <div class="control-group"><label data-lang-key="ambientLight">環境光</label><input type="range" id="ambient-slider" min="0" max="2" step="0.1" value="0.4"></div>
        <div class="control-group"><label data-lang-key="spotlightPower">射燈強度</label><input type="range" id="spot-slider" min="0" max="100" step="5" value="35"></div>
        <div class="control-group"><label data-lang-key="focusScale">射燈光圈大小</label><input type="range" id="spot-angle-slider" min="0.1" max="1.2" step="0.05" value="0.7"></div>
        <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0;"></div>
        <div class="control-group" style="display:flex; flex-wrap: wrap; gap: 15px;">
            <label data-lang-key="lights" style="display:flex; align-items:center; gap:8px; cursor:pointer;"><input type="checkbox" id="spot-toggle" checked> 燈光</label>
            <label data-lang-key="reticle" style="display:flex; align-items:center; gap:8px; cursor:pointer;"><input type="checkbox" id="reticle-toggle" checked> 準星</label>
            <label data-lang-key="muteAll" style="display:flex; align-items:center; gap:8px; cursor:pointer;"><input type="checkbox" id="mute-toggle"> 靜音 (Y)</label>
            <label data-lang-key="fpsCounter" style="display:flex; align-items:center; gap:8px; cursor:pointer;"><input type="checkbox" id="fps-toggle"> 幀數顯示</label>
            <label data-lang-key="torch" style="display:flex; align-items:center; gap:8px; cursor:pointer;"><input type="checkbox" id="flashlight-toggle"> 手電筒 (F)</label>
        </div>
        <button class="glass-btn" id="reset-settings" data-lang-key="restoreDefault" style="width:100%; margin-top:10px; font-size:9px;">恢復預設值</button>
    </div>

    <div id="start-overlay">
        <h2 data-lang-key="pause">暫停</h2>
        <button class="glass-btn" id="resume-btn" data-lang-key="resumeSession" style="padding: 15px 60px; font-size: 14px;">返回</button>
    </div>

    <div id="loading-overlay" data-lang-key="curatingArtworks">策展中...</div>

    <script>
        let scene, camera, renderer, player, pitch, raycaster = new THREE.Raycaster();
        let ambientLight, flashlight, spotLights = [], selectableArt = [];
        let floors = [], currentFloorIdx = 0;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = true, velocityY = 0, isLoading = false, isPaused = true, isSettingsOpen = false;
        let lastTime = performance.now(), frameCount = 0;

        let isZooming = false, targetZoomFov = 25, currentVisualFov = 60;
        let activeVideo = null, longPressTimer = null, isLongPressActive = false, timerHideTimeout = null;
        let rewindInterval = null; 
        let videoStatusText = ""; // 用於顯示 Replayed 狀態

        let bench, isSitting = false, isStandingUp = false, canBenchInteract = false;
        const benchPos = new THREE.Vector3(0, 0, 0);
        const benchBox = { w: 12.5, d: 5.5 }; 
        let audioCtx, footstepBuffer, ambienceGain, musicGain, distanceAccumulator = 0;
        let preSittingPos = new THREE.Vector3(), preSittingRotY = 0, targetSittingRotY = 0;
        let currentLang = 'en'; // Default to English
        let focusHideTimer = null, lastPointedCanvas = null, isReticleFocusHidden = false;

        const translations = {
            en: {
                enterGallery: "Enter Gallery", floors: "Floors (E)", engine: "Engine (U)",
                systemOptics: "SYSTEM OPTICS", movementSpeed: "Movement Speed", jumpImpulse: "Jump Impulse",
                footstepVolume: "Footstep Volume", ambienceVolume: "Ambience Volume", musicVolume: "Music Volume",
                viewPerspective: "View Perspective (FOV)", ambientLight: "Ambient Light", spotlightPower: "Spotlight Power",
                focusScale: "Focus Scale", lights: "Lights", reticle: "Reticle", muteAll: "Mute Audio (Y)", fpsCounter: "FPS Counter",
                torch: "Torch (F)", restoreDefault: "Restore Default", pause: "PAUSE", resumeSession: "Resume Session",
                curatingArtworks: "CURATING ARTWORKS...", pressSpaceToSit: "PRESS [SPACE] TO REST",
                pressSpaceToStand: "PRESS [SPACE] TO STAND UP", language: "Language"
            },
            zh: {
                enterGallery: "進入展覽", floors: "樓層 (E)", engine: "設定 (U)",
                systemOptics: "系統選項", movementSpeed: "移動速度", jumpImpulse: "跳躍力道", 
                footstepVolume: "腳步音量", ambienceVolume: "環境音量", musicVolume: "音樂音量",
                viewPerspective: "視角廣度 (FOV)", ambientLight: "環境光", spotlightPower: "聚光燈強度",
                focusScale: "光圈大小", lights: "燈光", reticle: "準星", muteAll: "靜音 (Y)", fpsCounter: "幀數顯示",
                torch: "手電筒 (F)", restoreDefault: "恢復預設值", pause: "暫停", resumeSession: "返回",
                curatingArtworks: "策展中...", pressSpaceToSit: "按下 [SPACE] 休息",
                pressSpaceToStand: "按下 [SPACE] 站起", language: "語言"
            }
        };

        const state = { speed: 0.38, jumpForce: 0.2, footstepVolume: 1.0, ambienceVolume: 0.5, musicVolume: 0.3, fov: 60, ambientIntensity: 0.4, spotIntensity: 35, spotAngle: 0.7, spotVisible: true, reticleVisible: true, flashlightOn: false, fpsVisible: false, audioMuted: false };
        const defaultState = { ...state };
        const ROOM = { w: 100, d: 120, h: 22 }; 
        const mediaObjects = []; 

        function saveSettings() {
            try {
                localStorage.setItem('lumiereEliteSettings', JSON.stringify({ state: state, lang: currentLang }));
            } catch (e) {
                console.error("Failed to save settings to localStorage", e);
            }
        }

        function loadSettings() {
            const savedSettings = localStorage.getItem('lumiereEliteSettings');
            if (savedSettings) {
                try {
                    const parsed = JSON.parse(savedSettings);
                    Object.assign(state, parsed.state);
                    currentLang = parsed.lang || 'en';
                } catch (e) { console.error("Failed to parse settings, using defaults.", e); }
            }
        }

        loadSettings();
        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010101);
            player = new THREE.Object3D();
            player.position.set(0, 5.5, 50);
            scene.add(player);
            pitch = new THREE.Object3D();
            player.add(pitch);
            camera = new THREE.PerspectiveCamera(state.fov, window.innerWidth / window.innerHeight, 0.1, 1000);
            pitch.add(camera);
            currentVisualFov = state.fov;

            flashlight = new THREE.SpotLight(0xffffff, 40, 45, Math.PI / 6, 0.4, 1.2);
            flashlight.visible = state.flashlightOn;
            camera.add(flashlight);
            flashlight.target.position.set(0, 0, -5);
            camera.add(flashlight.target);

            buildGallery();
            initAudio();
            addCustomMarbleBench();

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding; 
            renderer.toneMapping = THREE.ACESFilmicToneMapping; 
            renderer.physicallyCorrectLights = true; 
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            updateUIFromState(); // Set UI controls to reflect loaded/default state
            setupInteractiveControls(); // Add listeners that will save settings on change
            applyLanguage(currentLang); // Set initial language
            document.getElementById('file-input').addEventListener('change', handleFiles);
            window.addEventListener('resize', onWindowResize);
            
            document.getElementById('canvas-container').addEventListener('click', () => {
                if (!isLoading && !isPaused && !isSettingsOpen) {
                    document.body.requestPointerLock();
                    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                }
            });
        }

        function buildGallery() {
            const loader = new THREE.TextureLoader();
            const floorTex = loader.load('https://threejs.org/examples/textures/hardwood2_diffuse.jpg');
            floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(8, 10);
            const floorMesh = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.w, ROOM.d), new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.65, metalness: 0.05, color: 0xf4f4f4 }));
            floorMesh.rotation.x = -Math.PI / 2;
            scene.add(floorMesh);

            const wallTex = loader.load('https://sally802528.github.io/LUMIERE-SPACE/Poliigon_ConcreteWorn_8690_BaseColor.jpg');
            wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
            wallTex.repeat.set(4, 1);
            const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, color: 0xffffff, roughness: 0.8 });
            const createW = (w, h, x, z, ry) => { const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat); m.position.set(x, h/2, z); m.rotation.y = ry; scene.add(m); };
            createW(ROOM.w, ROOM.h, 0, -ROOM.d/2, 0); createW(ROOM.d, ROOM.h, ROOM.w/2, 0, -Math.PI/2); createW(ROOM.w, ROOM.h, 0, ROOM.d/2, Math.PI); createW(ROOM.d, ROOM.h, -ROOM.w/2, 0, Math.PI/2);

            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.w, ROOM.d), new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1.0 }));
            ceil.position.y = ROOM.h; ceil.rotation.x = Math.PI/2; scene.add(ceil);
            ambientLight = new THREE.AmbientLight(0xffffff, state.ambientIntensity);
            scene.add(ambientLight);
        }

        function initAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const bufferSize = audioCtx.sampleRate * 0.5;
                footstepBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = footstepBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) { data[i] = (Math.random() * 2 - 1); }

                // Ambience (Room Tone / Air Con)
                const ambSize = audioCtx.sampleRate * 5;
                const ambBuffer = audioCtx.createBuffer(1, ambSize, audioCtx.sampleRate);
                const ambData = ambBuffer.getChannelData(0);
                for (let i = 0; i < ambSize; i++) { ambData[i] = (Math.random() * 2 - 1) * 0.5; } // White noise
                const ambSrc = audioCtx.createBufferSource(); ambSrc.buffer = ambBuffer; ambSrc.loop = true;
                const ambFilter = audioCtx.createBiquadFilter(); ambFilter.type = 'lowpass'; ambFilter.frequency.value = 400;
                ambienceGain = audioCtx.createGain(); ambienceGain.gain.value = state.audioMuted ? 0 : state.ambienceVolume;
                ambSrc.connect(ambFilter); ambFilter.connect(ambienceGain); ambienceGain.connect(audioCtx.destination);
                ambSrc.start();

                // Music (Light Piano/Music Box style)
                musicGain = audioCtx.createGain();
                musicGain.gain.setValueAtTime(state.audioMuted ? 0 : state.musicVolume, audioCtx.currentTime);
                musicGain.connect(audioCtx.destination);

                // Load "Gymnopedie No. 1" by Erik Satie (Public Domain / CC)
                const musicUrl = 'https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Kevin_MacLeod/Classical_Sampler/Kevin_MacLeod_-_Erik_Satie_Gymnopedie_No_1.mp3';
                fetch(musicUrl)
                    .then(response => response.arrayBuffer())
                    .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
                    .then(audioBuffer => {
                        const musicSource = audioCtx.createBufferSource();
                        musicSource.buffer = audioBuffer;
                        musicSource.loop = true;
                        musicSource.connect(musicGain);
                        musicSource.start();
                    })
                    .catch(e => console.error("Error loading music:", e));

                if (isPaused && audioCtx.state === 'running') audioCtx.suspend();
            } catch(e) { console.warn("Web Audio API not supported"); }
        }

        function playFootstep(isLanding = false) {
            if (!audioCtx || state.footstepVolume <= 0) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const src = audioCtx.createBufferSource();
            src.buffer = footstepBuffer;
            src.playbackRate.value = (0.8 + Math.random() * 0.4) * (isLanding ? 0.8 : 1.0); // Randomize pitch, lower for landing
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = isLanding ? 120 : 180; // Low thud sound
            const gain = audioCtx.createGain();
            const volume = state.footstepVolume * (isLanding ? 8.0 : 5.0); // Further boosted volume
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (isLanding ? 0.25 : 0.1));
            src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            src.start();
        }

        function addCustomMarbleBench() {
            const loader = new THREE.TextureLoader();
            const marbleUrl = 'https://sally802528.github.io/LUMIERE-SPACE/Poliigon_StoneQuartzite_8060_BaseColor.jpg';
            const marbleTex = loader.load(marbleUrl);
            marbleTex.wrapS = marbleTex.wrapT = THREE.RepeatWrapping; marbleTex.repeat.set(2, 1);
            const marbleMat = new THREE.MeshStandardMaterial({ map: marbleTex, roughness: 0.1, metalness: 0.05, emissive: 0xf4f4f4, emissiveIntensity: 0.05 });
            bench = new THREE.Group();
            const seatHeight = 2.4, baseHeight = 0.6;
            const seat = new THREE.Mesh(new THREE.BoxGeometry(12, seatHeight, 5), marbleMat);
            seat.position.y = baseHeight + (seatHeight / 2); bench.add(seat);
            const base = new THREE.Mesh(new THREE.BoxGeometry(10, baseHeight, 4), marbleMat);
            base.position.y = baseHeight / 2; bench.add(base);
            scene.add(bench);
        }

        async function handleFiles(e) {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/') || f.type.startsWith('video/'));
            if(files.length === 0) return;
            floors = []; let currentFloorItems = [];
            files.forEach((file, idx) => { currentFloorItems.push(file); if(currentFloorItems.length >= 16 || idx === files.length - 1) { floors.push([...currentFloorItems]); currentFloorItems = []; } });
            document.getElementById('ui-layer').style.opacity = '0';
            setTimeout(() => { document.getElementById('ui-layer').style.display = 'none'; }, 800);
            await loadFloor(0, true);
            document.body.requestPointerLock();
            if(floors.length > 1) document.getElementById('floor-control').style.display = 'block';
        }

        async function loadFloor(idx, resetPos = false) {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-overlay').style.opacity = '1';
            mediaObjects.forEach(obj => { if(obj.video) { obj.video.pause(); obj.video.src=""; obj.video.load(); obj.video.remove(); } scene.remove(obj.parent); });
            spotLights.forEach(l => { scene.remove(l.target); scene.remove(l); });
            mediaObjects.length = 0; spotLights.length = 0; selectableArt = [];
            const files = floors[idx];
            const walls = [{ axis: 'x', start: -ROOM.w/2+10, limit: ROOM.w/2-10, pos: {x:0, z:-ROOM.d/2+0.3}, rot: 0 }, { axis: 'z', start: -ROOM.d/2+10, limit: ROOM.d/2-10, pos: {x:ROOM.w/2-0.3, z:0}, rot: -Math.PI/2 }, { axis: 'x', start: -ROOM.w/2+10, limit: ROOM.w/2-10, pos: {x:0, z:ROOM.d/2-0.3}, rot: Math.PI }, { axis: 'z', start: -ROOM.d/2+10, limit: ROOM.d/2-10, pos: {x:-ROOM.w/2+0.3, z:0}, rot: Math.PI/2 }];
            let wallIdx = 0, cursor = walls[0].start;
            const texLoader = new THREE.TextureLoader();
            for (const file of files) {
                let texture, vEl = null, aspect = 1.6;
                const url = URL.createObjectURL(file);
                if (file.type.startsWith('video/')) {
                    vEl = document.createElement('video'); vEl.src = url; vEl.muted = true; vEl.loop = true; vEl.playsInline = true;
                    await new Promise(r => { vEl.onloadedmetadata = r; setTimeout(r, 1000); });
                    texture = new THREE.VideoTexture(vEl); aspect = vEl.videoWidth / vEl.videoHeight || 1.6;
                } else { const tex = await texLoader.loadAsync(url); aspect = tex.image.width / tex.image.height; texture = tex; }
                const h = 9, w = h * aspect, gap = 12;
                if (cursor + w > walls[wallIdx].limit) { wallIdx++; if (wallIdx >= walls.length) break; cursor = walls[wallIdx].start; }
                const wall = walls[wallIdx];
                const artGroup = new THREE.Group();
                const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.6, h+0.6, 0.4), new THREE.MeshStandardMaterial({ color: 0x030303, metalness: 0.1, roughness: 0.5 }));
                artGroup.add(frame);
                const canvas = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshStandardMaterial({ map: texture, emissive: 0xffffff, emissiveIntensity: 0.05, roughness: 0.4 }));
                canvas.position.z = 0.22; artGroup.add(canvas); selectableArt.push(canvas); 
                artGroup.position.set(wall.axis === 'x' ? cursor + w/2 : wall.pos.x, 8, wall.axis === 'z' ? cursor + w/2 : wall.pos.z);
                artGroup.rotation.y = wall.rot; scene.add(artGroup);
                addSpotlight(artGroup, w, h, wall.rot);
                mediaObjects.push({ video: vEl, parent: artGroup, texture: texture, canvas: canvas }); cursor += w + gap;
            }
            if(resetPos) player.position.set(0, 5.5, 50);
            applySpotSettings();
            document.getElementById('loading-overlay').style.opacity = '0'; 
            setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; isLoading = false; if (document.getElementById('ui-layer').style.display === 'none') document.body.requestPointerLock(); }, 1000);
        }

        function addSpotlight(targetGroup, w, h, rotation) {
            const light = new THREE.SpotLight(0xffffff, state.spotIntensity, 50, state.spotAngle, 0.8, 1.2);
            light.position.set(targetGroup.position.x + Math.sin(rotation)*7, targetGroup.position.y + 8, targetGroup.position.z + Math.cos(rotation)*7);
            const target = new THREE.Object3D(); target.position.copy(targetGroup.position);
            scene.add(target); light.target = target; scene.add(light); spotLights.push(light);
        }

        function applySpotSettings() { spotLights.forEach(l => { l.intensity = state.spotIntensity; l.angle = state.spotAngle; l.visible = state.spotVisible; }); }
        function formatTime(s) { if(!s || isNaN(s)) return "00:00"; const min = Math.floor(s / 60); const sec = Math.floor(s % 60); return `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }

        function showTimerUI() {
            const timer = document.getElementById('video-timer');
            timer.style.opacity = '1';
            clearTimeout(timerHideTimeout);
            timerHideTimeout = setTimeout(() => { if(!isLongPressActive) timer.style.opacity = '0'; }, 5000);
        }

        function setVideoReplayedStatus() {
            videoStatusText = "(Replayed)";
            showTimerUI();
            setTimeout(() => { videoStatusText = ""; }, 2000);
        }

        function applyLanguage(lang) {
            if (!translations[lang]) return;
            currentLang = lang;
            const t = translations[lang];

            document.querySelectorAll('[data-lang-key]').forEach(el => {
                const key = el.dataset.langKey;
                if (t[key]) {
                    if (el.tagName === 'LABEL' && el.querySelector('input[type=checkbox]')) {
                        el.lastChild.textContent = ' ' + t[key];
                    } else {
                        el.innerText = t[key];
                    }
                }
            });
            
            // Update active button style
            document.querySelectorAll('#lang-switcher .lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
        }

        function applyMuteState() {
            if (ambienceGain) ambienceGain.gain.value = state.audioMuted ? 0 : state.ambienceVolume;
        }

        function updateUIFromState() {
            // Update UI sliders to reflect current state values
            document.getElementById('speed-slider').value = state.speed;
            document.getElementById('jump-slider').value = state.jumpForce;
            document.getElementById('footstep-slider').value = state.footstepVolume;
            document.getElementById('ambience-slider').value = state.ambienceVolume;
            document.getElementById('music-slider').value = state.musicVolume;
            document.getElementById('fov-slider').value = state.fov;
            document.getElementById('ambient-slider').value = state.ambientIntensity;
            document.getElementById('spot-slider').value = state.spotIntensity;
            document.getElementById('spot-angle-slider').value = state.spotAngle;

            // Update UI checkboxes
            document.getElementById('spot-toggle').checked = state.spotVisible;
            document.getElementById('reticle-toggle').checked = state.reticleVisible;
            document.getElementById('fps-toggle').checked = state.fpsVisible;
            document.getElementById('mute-toggle').checked = state.audioMuted;
            document.getElementById('flashlight-toggle').checked = state.flashlightOn;
        }

        function resetSettingsToDefault() {
            // Reset state object by copying from defaultState
            Object.assign(state, defaultState);

            // Update UI sliders to reflect default values
            document.getElementById('speed-slider').value = state.speed;
            document.getElementById('jump-slider').value = state.jumpForce;
            updateUIFromState();

            // Apply the visual/engine changes
            ambientLight.intensity = state.ambientIntensity;
            applySpotSettings();
            if(ambienceGain) ambienceGain.gain.value = state.ambienceVolume;
            if(musicGain) musicGain.gain.value = state.musicVolume;
            document.getElementById('fps-counter').style.display = state.fpsVisible ? 'block' : 'none';
            flashlight.visible = state.flashlightOn;

            // Reset active video's current time
            if (activeVideo) {
                activeVideo.currentTime = 0;
                setVideoReplayedStatus();
            }
            
            saveSettings();
        }

        function setupInteractiveControls() {
            const toggleSettings = () => {
                isSettingsOpen = !isSettingsOpen;
                if (isSettingsOpen) { document.exitPointerLock(); document.getElementById('settings-panel').style.display = 'block'; }
                else { document.body.requestPointerLock(); document.getElementById('settings-panel').style.display = 'none'; }
            };

            document.getElementById('lang-switcher').addEventListener('click', (e) => {
                if (e.target.matches('.lang-btn')) {
                    applyLanguage(e.target.dataset.lang);
                    saveSettings();
                }
            });

            document.getElementById('resume-btn').onclick = () => document.body.requestPointerLock();
            document.getElementById('settings-trigger').onclick = (e) => { e.stopPropagation(); toggleSettings(); };
            document.getElementById('speed-slider').oninput = (e) => { state.speed = parseFloat(e.target.value); saveSettings(); };
            document.getElementById('jump-slider').oninput = (e) => { state.jumpForce = parseFloat(e.target.value); saveSettings(); };
            document.getElementById('footstep-slider').oninput = (e) => { state.footstepVolume = parseFloat(e.target.value); saveSettings(); };
            document.getElementById('ambience-slider').oninput = (e) => { state.ambienceVolume = parseFloat(e.target.value); if(ambienceGain) ambienceGain.gain.value = state.audioMuted ? 0 : state.ambienceVolume; saveSettings(); };
            document.getElementById('music-slider').oninput = (e) => { state.musicVolume = parseFloat(e.target.value); saveSettings(); };
            document.getElementById('fov-slider').oninput = (e) => { state.fov = parseFloat(e.target.value); saveSettings(); };
            document.getElementById('ambient-slider').oninput = (e) => { state.ambientIntensity = parseFloat(e.target.value); ambientLight.intensity = state.ambientIntensity; saveSettings(); };
            document.getElementById('spot-slider').oninput = (e) => { state.spotIntensity = parseFloat(e.target.value); applySpotSettings(); saveSettings(); };
            document.getElementById('spot-angle-slider').oninput = (e) => { state.spotAngle = parseFloat(e.target.value); applySpotSettings(); saveSettings(); };
            document.getElementById('spot-toggle').onchange = (e) => { state.spotVisible = e.target.checked; applySpotSettings(); saveSettings(); };
            document.getElementById('mute-toggle').onchange = (e) => {
                state.audioMuted = e.target.checked;
                applyMuteState();
                saveSettings();
            };
            document.getElementById('reticle-toggle').onchange = (e) => { state.reticleVisible = e.target.checked; saveSettings(); };
            document.getElementById('fps-toggle').onchange = (e) => { state.fpsVisible = e.target.checked; document.getElementById('fps-counter').style.display = state.fpsVisible ? 'block' : 'none'; saveSettings(); };
            document.getElementById('flashlight-toggle').onchange = (e) => { state.flashlightOn = e.target.checked; flashlight.visible = state.flashlightOn; saveSettings(); };
            document.getElementById('reset-settings').onclick = resetSettingsToDefault;

            document.addEventListener('pointerlockchange', () => {
                const isLocked = document.pointerLockElement === document.body;
                if(!isLocked) { 
                    isPaused = true; 
                    if(audioCtx && audioCtx.state === 'running') audioCtx.suspend();
                } else { 
                    isPaused = false; 
                    document.getElementById('settings-panel').style.display = 'none'; 
                    isSettingsOpen = false; 
                    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                }
            });

            window.addEventListener('wheel', e => { if(isZooming && !isPaused) { e.preventDefault(); targetZoomFov = Math.max(5, Math.min(state.fov - 5, targetZoomFov + e.deltaY * 0.05)); } }, { passive: false });

            window.addEventListener('keydown', e => {
                if(e.code === 'KeyU') { e.preventDefault(); toggleSettings(); }
                if(e.code === 'KeyY') {
                    state.audioMuted = !state.audioMuted;
                    document.getElementById('mute-toggle').checked = state.audioMuted;
                    applyMuteState();
                    saveSettings();
                }
                if(e.code === 'KeyF') { state.flashlightOn = !state.flashlightOn; flashlight.visible = state.flashlightOn; document.getElementById('flashlight-toggle').checked = state.flashlightOn; }
                if(e.code === 'KeyE' && !isLoading) { currentFloorIdx = (currentFloorIdx + 1) % floors.length; loadFloor(currentFloorIdx, false); }
                
                if(e.code === 'Space' && !isStandingUp) {
                    if (canBenchInteract || isSitting) {
                        if (!isSitting) {
                            preSittingPos.copy(player.position); preSittingRotY = player.rotation.y;
                            targetSittingRotY = Math.atan2(player.position.x - benchPos.x, player.position.z - benchPos.z);
                            isSitting = true;
                        } else { isSitting = false; isStandingUp = true; }
                    } else if (canJump && !isPaused) { velocityY = state.jumpForce; canJump = false; }
                }

                if(!isSitting && !isStandingUp) {
                    if(e.code==='KeyW') moveForward=true; if(e.code==='KeyS') moveBackward=true;
                    if(e.code==='KeyA') moveLeft=true; if(e.code==='KeyD') moveRight=true;
                }
                if(e.code === 'KeyC') { isZooming = true; }
                
                if(activeVideo && (e.code === 'ArrowLeft' || e.code === 'ArrowRight')) {
                    const btnId = (e.code === 'ArrowLeft') ? 'btn-prev' : 'btn-next';
                    document.getElementById(btnId).classList.add('pressing'); showTimerUI();
                    if(!longPressTimer) {
                        longPressTimer = setTimeout(() => { 
                            isLongPressActive = true; document.getElementById(btnId).classList.add('breath');
                            if (e.code === 'ArrowRight') {
                                // 快進邏輯
                                if(activeVideo.duration - activeVideo.currentTime < 2) { 
                                    activeVideo.currentTime = 0; setVideoReplayedStatus();
                                } else { activeVideo.playbackRate = 4.0; }
                            } else {
                                activeVideo.playbackRate = 0; 
                                rewindInterval = setInterval(() => { 
                                    if(activeVideo.currentTime > 0.3) activeVideo.currentTime -= 0.3; 
                                    else activeVideo.currentTime = 0;
                                }, 50); 
                            }
                        }, 500);
                    }
                }
            });

            window.addEventListener('keyup', e => {
                if(e.code === 'KeyC') { isZooming = false; }
                if(activeVideo && (e.code === 'ArrowLeft' || e.code === 'ArrowRight')) {
                    if(!isLongPressActive) {
                        const skipTime = 10;
                        if (e.code === 'ArrowRight') {
                            if(activeVideo.duration - activeVideo.currentTime <= skipTime) {
                                activeVideo.currentTime = 0; setVideoReplayedStatus();
                            } else { activeVideo.currentTime += skipTime; }
                        } else { activeVideo.currentTime = Math.max(0, activeVideo.currentTime - skipTime); }
                    }
                    clearTimeout(longPressTimer); clearInterval(rewindInterval);
                    longPressTimer = null; rewindInterval = null; isLongPressActive = false; 
                    activeVideo.playbackRate = 1.0; 
                    document.querySelectorAll('.ctrl-arrow').forEach(el => el.classList.remove('pressing', 'breath')); showTimerUI();
                }
                if(e.code==='KeyW') moveForward=false; if(e.code==='KeyS') moveBackward=false;
                if(e.code==='KeyA') moveLeft=false; if(e.code==='KeyD') moveRight=false;
            });

            document.addEventListener('mousemove', e => {
                if (document.pointerLockElement === document.body && !isSitting) {
                    // 如果滑鼠移動，重置因長時間注視而隱藏的準星狀態
                    if (isReticleFocusHidden) {
                        isReticleFocusHidden = false;
                    }
                    // 任何滑鼠移動都應重啟10秒計時器
                    clearTimeout(focusHideTimer);
                    focusHideTimer = null;
                    lastPointedCanvas = null; // 強制在下一幀重新評估

                    // 修正視角突跳/回朔問題：忽略異常大的滑鼠移動數值 (通常發生在 Pointer Lock 重新取得焦點時)
                    if (Math.abs(e.movementX) > 500 || Math.abs(e.movementY) > 500) return;

                    const sensitivity = isZooming ? 0.0006 : 0.0018;
                    player.rotation.y -= e.movementX * sensitivity;
                    pitch.rotation.x -= e.movementY * sensitivity;
                    pitch.rotation.x = Math.max(-1.5, Math.min(1.5, pitch.rotation.x));
                }
            });
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        function updateFPS() { frameCount++; const time = performance.now(); if (time >= lastTime + 1000) { document.getElementById('fps-counter').innerText = `FPS: ${Math.round((frameCount * 1000) / (time - lastTime))}`; frameCount = 0; lastTime = time; } }

        function lerpAngle(current, target, lerpFactor) {
            let diff = (target - current + Math.PI) % (Math.PI * 2) - Math.PI;
            if (diff < -Math.PI) diff += Math.PI * 2;
            return current + diff * lerpFactor;
        }

        function animate() {
            requestAnimationFrame(animate);

            // 根據當前狀態，管理暫停選單的顯示，確保在任何游標解鎖的情況下都能正確顯示
            const isLocked = !!document.pointerLockElement;
            const showPauseMenu = !isLocked && !isSettingsOpen && document.getElementById('ui-layer').style.display === 'none' && !isLoading;
            document.getElementById('start-overlay').style.display = showPauseMenu ? 'flex' : 'none';

            if (state.fpsVisible) updateFPS();
            const prompt = document.getElementById('interaction-prompt');
            const reticle = document.getElementById('reticle');
            const targetFov = isZooming ? targetZoomFov : state.fov;
            currentVisualFov += (targetFov - currentVisualFov) * 0.15;
            if (Math.abs(camera.fov - currentVisualFov) > 0.01) { camera.fov = currentVisualFov; camera.updateProjectionMatrix(); }

            if (!isLoading) {
                raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                const intersectsArt = raycaster.intersectObjects(selectableArt);
                const intersectsBench = raycaster.intersectObjects(bench.children);
                const pointedCanvas = (intersectsArt.length > 0 && intersectsArt[0].distance < 30) ? intersectsArt[0].object : null;
                const distToBench = player.position.distanceTo(benchPos);
                canBenchInteract = intersectsBench.length > 0 && distToBench < 10;

                // --- 準星可見性邏輯 ---
                let shouldBeVisible = state.reticleVisible;
                // 條件1: 縮放時隱藏
                if (isZooming) shouldBeVisible = false;
                
                // 條件2: 長時間注視同一作品時隱藏
                if (pointedCanvas && pointedCanvas === lastPointedCanvas) {
                    if (isReticleFocusHidden) shouldBeVisible = false;
                } else {
                    isReticleFocusHidden = false; // 目標已變，重置狀態
                    clearTimeout(focusHideTimer); // 清除舊計時器
                    if (pointedCanvas) {
                        // 開始新的10秒計時器
                        focusHideTimer = setTimeout(() => { isReticleFocusHidden = true; }, 10000);
                    }
                }
                lastPointedCanvas = pointedCanvas;

                reticle.style.opacity = shouldBeVisible ? '1' : '0';
                reticle.classList.toggle('active', shouldBeVisible && (!!pointedCanvas || (canBenchInteract && !isSitting)));

                if (isSitting) {
                    player.position.lerp(new THREE.Vector3(0, 5.8, 0), 0.08);
                    player.rotation.y = lerpAngle(player.rotation.y, targetSittingRotY, 0.15);
                    pitch.rotation.x = THREE.MathUtils.lerp(pitch.rotation.x, 0, 0.15);;
                    prompt.style.display = 'block'; prompt.innerText = translations[currentLang].pressSpaceToStand;
                } else if (isStandingUp) {
                    player.position.lerp(preSittingPos, 0.1);
                    player.rotation.y = lerpAngle(player.rotation.y, preSittingRotY, 0.1);
                    if (player.position.distanceTo(preSittingPos) < 0.1) isStandingUp = false;
                    prompt.style.display = 'none';
                } else {
                    prompt.style.display = canBenchInteract ? 'block' : 'none';;
                    prompt.innerText = translations[currentLang].pressSpaceToSit;

                    if ((document.pointerLockElement || isSettingsOpen) && !isPaused) {
                        const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
                        const side = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0,1,0));
                        let dX = 0, dZ = 0;
                        if(moveForward) { dX += dir.x * state.speed; dZ += dir.z * state.speed; }
                        if(moveBackward) { dX -= dir.x * state.speed; dZ -= dir.z * state.speed; }
                        if(moveLeft) { dX -= side.x * state.speed; dZ -= side.z * state.speed; }
                        if(moveRight) { dX += side.x * state.speed; dZ += side.z * state.speed; }

                        const nextX = player.position.x + dX, nextZ = player.position.z + dZ;
                        const borderW = ROOM.w/2 - 5, borderD = ROOM.d/2 - 5;
                        const oldX = player.position.x, oldZ = player.position.z;

                        if (!(Math.abs(nextX - benchPos.x) < benchBox.w / 2 && Math.abs(player.position.z - benchPos.z) < benchBox.d / 2)) player.position.x = Math.max(-borderW, Math.min(borderW, nextX));
                        if (!(Math.abs(player.position.x - benchPos.x) < benchBox.w / 2 && Math.abs(nextZ - benchPos.z) < benchBox.d / 2)) player.position.z = Math.max(-borderD, Math.min(borderD, nextZ));

                        if (canJump) {
                            const dist = Math.sqrt((player.position.x - oldX)**2 + (player.position.z - oldZ)**2);
                            if (dist > 0.001) {
                                distanceAccumulator += dist;
                                if (distanceAccumulator > 11.0) { playFootstep(); distanceAccumulator = 0; }
                            }
                        }
                    }
                    player.position.y += velocityY;
                    if (player.position.y > 5.5) {
                        velocityY -= 0.008; 
                    } else { 
                        if (!canJump) playFootstep(true); // Landing sound
                        player.position.y = 5.5; velocityY = 0; canJump = true; 
                    }
                }

                let foundActiveVideo = null;
                const viewDir = new THREE.Vector3(); camera.getWorldDirection(viewDir);
                
                if (!isPaused && document.getElementById('ui-layer').style.display === 'none') {
                    if (pointedCanvas) {
                        const targetObj = mediaObjects.find(obj => obj.canvas === pointedCanvas);
                        if (targetObj && targetObj.video) foundActiveVideo = targetObj.video;
                    }

                    if (!foundActiveVideo) {
                        let minDistance = 25;
                        mediaObjects.forEach(obj => {
                            if (obj.video) {
                                const dist = player.position.distanceTo(obj.parent.position);
                                const toTarget = new THREE.Vector3().subVectors(obj.parent.position, player.position).normalize();
                                const isLookingAt = viewDir.dot(toTarget) > 0.85;
                                if (dist < minDistance && isLookingAt) {
                                    minDistance = dist;
                                    foundActiveVideo = obj.video;
                                }
                            }
                        });
                    }
                }

                mediaObjects.forEach(obj => {
                    if (obj.video) {
                        const isTarget = (obj.video === foundActiveVideo);
                        if (isTarget) {
                            // 自動循環播放設定
                            if (obj.video.paused && !isLongPressActive) {
                                obj.video.muted = false;
                                obj.video.loop = true; // 確保自動循環
                                obj.video.play().catch(() => {});
                            }
                            if (obj.texture && obj.video.readyState >= 2) obj.texture.needsUpdate = true;
                        } else {
                            if (!obj.video.paused) { obj.video.pause(); obj.video.muted = true; }
                        }
                    }
                });

                if (foundActiveVideo) {
                    activeVideo = foundActiveVideo;
                    document.getElementById('video-controls').style.opacity = '1';
                    
                    // 根據狀態顯示時間或 Replayed
                    const timeString = `${formatTime(activeVideo.currentTime)} / ${formatTime(activeVideo.duration)}`;
                    document.getElementById('video-timer').innerText = videoStatusText ? videoStatusText : timeString;
                } else if (!isLongPressActive) {
                    activeVideo = null;
                    document.getElementById('video-controls').style.opacity = '0';
                }

                // Audio ducking for music when focusing on an artwork
                if (musicGain) {
                    const isFocusing = !!pointedCanvas;
                    const baseMusicVolume = state.audioMuted ? 0 : state.musicVolume;
                    const targetMusicVolume = isFocusing ? baseMusicVolume * 0.2 : baseMusicVolume;
                    musicGain.gain.value = THREE.MathUtils.lerp(musicGain.gain.value, targetMusicVolume, 0.08);
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
